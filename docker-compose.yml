services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./certs:/usr/local/share/ca-certificates/netfree:ro
    entrypoint: ["/bin/sh", "-c", "update-ca-certificates && ollama serve"]
    restart: unless-stopped
    # CPU-only: remove the 'deploy' block below if you have no NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_data:
